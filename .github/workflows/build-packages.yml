name: Build Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  # ─── Linux: .deb + .rpm ────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev rpm python3

      - name: Build .deb package
        run: bash build-packages.sh deb

      - name: Build .rpm package
        run: bash build-packages.sh rpm
        continue-on-error: true

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            dist/deb/*.deb
            dist/rpm/*.rpm

  # ─── macOS: Camera Extension + .pkg ────────────────────────────────────────
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show build environment
        run: |
          sw_vers
          xcodebuild -version
          uname -m

      - name: Build Camera Extension
        run: bash macos/build.sh

      - name: Build .pkg installer
        run: bash build-packages.sh pkg

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-packages
          path: |
            dist/macos/NVBroadcastExtension.systemextension/**
            dist/macos/frame_bridge.py
            dist/pkg/*.pkg

  # ─── Release: Upload packages on tag push ──────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            artifacts/linux-packages/deb/*.deb
            artifacts/linux-packages/rpm/*.rpm
            artifacts/macos-packages/pkg/*.pkg
