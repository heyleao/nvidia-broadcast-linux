name: Build & Publish Snap

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-snap:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Build snap
        uses: snapcore/action-build@v1
        id: snapcraft

      - name: Upload snap artifact
        uses: actions/upload-artifact@v4
        with:
          name: snap-package-${{ matrix.arch }}
          path: ${{ steps.snapcraft.outputs.snap }}

      - name: Validate Snap Store registration
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAP_TOKEN }}
        run: |
          SNAP_NAME="$(sed -n 's/^name:[[:space:]]*//p' snap/snapcraft.yaml | head -n1)"
          if [ -z "$SNAP_NAME" ]; then
            echo "::error::Could not read snap name from snap/snapcraft.yaml"
            exit 1
          fi

          if ! snapcraft revisions "$SNAP_NAME" >/tmp/snap-store-check.log 2>&1; then
            cat /tmp/snap-store-check.log
            if grep -qi "resource-not-found: Snap not found for name=$SNAP_NAME" /tmp/snap-store-check.log; then
              echo "::error::Snap '$SNAP_NAME' is not registered in the Snap Store for the account behind SNAP_TOKEN. Register it first with 'snapcraft register $SNAP_NAME' or rename snap/snapcraft.yaml to a snap name already registered to that account."
            else
              echo "::error::Snap Store validation failed for '$SNAP_NAME'. See the log output above."
            fi
            exit 1
          fi

      - name: Publish to Snap Store
        if: startsWith(github.ref, 'refs/tags/v')
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAP_TOKEN }}
        with:
          snap: ${{ steps.snapcraft.outputs.snap }}
          release: stable

      - name: Check GitHub release asset size
        if: startsWith(github.ref, 'refs/tags/v')
        id: release-asset
        run: |
          SNAP_PATH="${{ steps.snapcraft.outputs.snap }}"
          SNAP_SIZE="$(stat -c%s "$SNAP_PATH")"
          echo "size=$SNAP_SIZE" >> "$GITHUB_OUTPUT"
          if [ "$SNAP_SIZE" -lt 2147483648 ]; then
            echo "attach=true" >> "$GITHUB_OUTPUT"
          else
            echo "attach=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping GitHub release upload for $SNAP_PATH because it exceeds GitHub's 2 GiB release-asset limit."
          fi

      - name: Attach snap to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && steps.release-asset.outputs.attach == 'true'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: ${{ steps.snapcraft.outputs.snap }}
