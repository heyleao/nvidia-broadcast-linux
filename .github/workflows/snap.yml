name: Build & Publish Snap

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the built snap and attach it to an existing release tag.
        required: false
        type: boolean
        default: false
      release_tag:
        description: Existing release tag to attach assets to when publish is enabled.
        required: false
        type: string
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-snap:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Build snap
        uses: snapcore/action-build@v1
        id: snapcraft

      - name: Upload snap artifact
        uses: actions/upload-artifact@v4
        with:
          name: snap-package-${{ matrix.arch }}
          path: ${{ steps.snapcraft.outputs.snap }}

      - name: Resolve release target
        id: release-target
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish == true)
        env:
          DISPATCH_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          RELEASE_TAG="$GITHUB_REF_NAME"
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            RELEASE_TAG="$DISPATCH_RELEASE_TAG"
          fi

          if [ -z "$RELEASE_TAG" ]; then
            echo "::error::release_tag is required when publishing from workflow_dispatch."
            exit 1
          fi

          case "$RELEASE_TAG" in
            v*) ;;
            *)
              echo "::error::release_tag must be an existing version tag such as v1.1.10."
              exit 1
              ;;
          esac

          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Validate Snap Store registration
        if: steps.release-target.outputs.tag != ''
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAP_TOKEN }}
        run: |
          SNAP_NAME="$(sed -n 's/^name:[[:space:]]*//p' snap/snapcraft.yaml | head -n1)"
          if [ -z "$SNAP_NAME" ]; then
            echo "::error::Could not read snap name from snap/snapcraft.yaml"
            exit 1
          fi

          if ! snapcraft revisions "$SNAP_NAME" >/tmp/snap-store-check.log 2>&1; then
            cat /tmp/snap-store-check.log
            if grep -qi "resource-not-found: Snap not found for name=$SNAP_NAME" /tmp/snap-store-check.log; then
              echo "::error::Snap '$SNAP_NAME' is not registered in the Snap Store for the account behind SNAP_TOKEN. Register it first with 'snapcraft register $SNAP_NAME' or rename snap/snapcraft.yaml to a snap name already registered to that account."
            else
              echo "::error::Snap Store validation failed for '$SNAP_NAME'. See the log output above."
            fi
            exit 1
          fi

      - name: Publish to Snap Store
        if: steps.release-target.outputs.tag != ''
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAP_TOKEN }}
        with:
          snap: ${{ steps.snapcraft.outputs.snap }}
          release: stable

      - name: Check GitHub release asset size
        if: steps.release-target.outputs.tag != ''
        id: release-asset
        run: |
          SNAP_PATH="${{ steps.snapcraft.outputs.snap }}"
          SNAP_SIZE="$(stat -c%s "$SNAP_PATH")"
          echo "size=$SNAP_SIZE" >> "$GITHUB_OUTPUT"
          if [ "$SNAP_SIZE" -lt 2147483648 ]; then
            echo "attach=true" >> "$GITHUB_OUTPUT"
          else
            echo "attach=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping GitHub release upload for $SNAP_PATH because it exceeds GitHub's 2 GiB release-asset limit."
          fi

      - name: Attach snap to GitHub Release
        if: steps.release-target.outputs.tag != '' && steps.release-asset.outputs.attach == 'true'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          tag_name: ${{ steps.release-target.outputs.tag }}
          files: ${{ steps.snapcraft.outputs.snap }}
