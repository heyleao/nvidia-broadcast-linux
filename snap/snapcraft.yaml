name: nvbroadcast
base: core24
version: '1.1.11'
summary: Live background performance and stability patch
description: |
  NV Broadcast is an AI-powered virtual camera and voice enhancement app for
  Linux. It brings background blur, background replace, green-screen remove,
  eye contact correction, face relighting, video enhancement, recording, and
  local meeting transcription into one app.

  Recommended stable update:
  - v1.1.11 fixes white preview and missing-effects cases in OBS and meeting
    apps when a camera exposes raw video modes instead of MJPEG for the
    selected resolution.
  - Camera startup now avoids stale, metadata-only, and virtual-loopback source
    nodes after reboot or device-order changes.
  - The headless nvbroadcast-vcam command now uses the same camera compatibility
    path as the main app.
  - Source, Debian, RPM, and amd64 Snap installs now use the corrected CUDA
    runtime package paths for NVIDIA systems.
  - DocZeus, Zeus, and Killer remain the named premium processing modes; this
    update keeps those modes intact while improving camera compatibility and
    package reliability.
  - Manual Snap publishing can recover cleanly from an existing GitHub release
    tag, and Snap Store validation uses the current Snapcraft command.
  - Source, Debian, RPM, and amd64 Snap installs now install the CUDA mode
    runtime on NVIDIA systems, so CUDA modes get both GPU compositing and ONNX
    GPU inference instead of falling back to CPU inference after a partial
    install.
  - The arm64 Snap build stays portable and CPU-safe because ONNX Runtime GPU
    wheels are not published for Linux arm64 yet.
  - v1.1.10 improves live background replacement edges around hair, shoulders,
    raised hands, and finger gaps while reducing the extra CPU cost added by
    edge cleanup.
  - A new Compute selector lets users choose Auto, GPU Focused, or CPU Focused
    behavior depending on whether they want quality, GPU preference, or lower
    GPU load.
  - GPU Focused now clearly selects the DocZeus/CUDA path when available, while
    CPU Focused keeps users on CPU modes when they want to leave GPU resources
    free.
  - Meeting transcription packaging still uses the lighter faster-whisper
    runtime, with openai-whisper kept optional and guarded for compatible Python
    versions only.
  - Project sponsor/backer links, public sponsor walls, and About-window backer
    credits are easier to find.
  - v1.1.9 fixes the local meeting transcription runtime installer so all
    required faster-whisper support packages are installed correctly in the
    app, Debian/RPM packages, and macOS package path.
  - Missing-transcription messages now show the complete install command
    instead of a partial one-package command.
  - v1.1.8 prevents old background audio helpers from staying alive after the
    app closes, which can avoid doubled or echo-like microphone audio in calls.
  - The source installer no longer stops at the CuPy check step after the
    optional GPU package is installed.
  - Error messages during install now report the real exit code and show more
    useful output when optional GPU verification fails.
  - The app and project pages now make GitHub Sponsors support easier to find.

  Core features:
  - Blur your background
  - Replace your background with an image
  - Remove your background for green-screen workflows
  - Eye contact correction while reading or presenting
  - Face relighting to better match the background
  - Video enhancement with skin smooth, denoise, enhance, and sharpen controls
  - Voice studio tools plus local AI meeting transcription and summaries
  - DocZeus, Zeus, Killer, CUDA, and CPU processing modes for different systems
  - Works with Zoom, Chrome, OBS, Discord, and other webcam apps

  For install guides, release downloads, feature breakdowns, and upgrade
  instructions, visit the official website:
  https://nvbroadcast.domjarvis.com

grade: stable
confinement: strict
license: GPL-3.0
icon: data/icons/com.doczeus.NVBroadcast.svg
website: https://nvbroadcast.domjarvis.com
source-code: https://github.com/Hkshoonya/nvidia-broadcast-linux
issues: https://github.com/Hkshoonya/nvidia-broadcast-linux/issues
contact: https://nvbroadcast.domjarvis.com

platforms:
  amd64:
    build-on: [amd64]
    build-for: [amd64]
  arm64:
    build-on: [arm64]
    build-for: [arm64]

apps:
  nvbroadcast:
    command: bin/nvbroadcast-wrapper
    extensions: [gnome]
    plugs:
      - home
      - network
      - camera
      - audio-playback
      - audio-record
      - opengl
      - hardware-observe
      - process-control
      - system-observe
    environment:
      PYTHONPATH: $SNAP/lib/python3/dist-packages:$SNAP/usr/lib/python3/dist-packages

parts:
  nvbroadcast:
    plugin: python
    source: .
    python-packages:
      - numpy
      - opencv-python-headless
      - mediapipe
      - onnxruntime==1.24.4
      - onnx
      - faster-whisper
      - ctranslate2
      - huggingface-hub
      - httpx
      - tokenizers
      - soundfile
      - scipy
      - pyrnnoise
      - psutil
      - Pillow
      - requests
    stage-packages:
      - python3-gi
      - python3-gi-cairo
      - gir1.2-gtk-4.0
      - gir1.2-adw-1
      - gir1.2-gstreamer-1.0
      - gir1.2-gst-plugins-base-1.0
      - gstreamer1.0-plugins-base
      - gstreamer1.0-plugins-good
      - gstreamer1.0-plugins-bad
      - pipewire-bin
      - pulseaudio-utils
      - v4l-utils
      - libayatana-appindicator3-1
      - gir1.2-ayatanaappindicator3-0.1
    override-build: |
      craftctl default
      SNAP_PYTHON_SITE="$CRAFT_PART_INSTALL/lib/python3/dist-packages"
      mkdir -p "$SNAP_PYTHON_SITE"
      case "${CRAFT_ARCH_BUILD_FOR:-$(uname -m)}" in
        amd64|x86_64)
          echo "Installing amd64 CUDA mode runtime into Snap..."
          python3 -m pip install --no-cache-dir --upgrade \
            --target "$SNAP_PYTHON_SITE" \
            onnxruntime-gpu==1.24.4 \
            cupy-cuda12x \
            nvidia-cublas-cu12 \
            nvidia-cuda-runtime-cu12 \
            nvidia-cudnn-cu12 \
            nvidia-curand-cu12 \
            nvidia-cufft-cu12 \
            nvidia-nvjitlink-cu12 \
            nvidia-cuda-nvrtc-cu12
          ;;
        *)
          echo "Skipping CUDA mode runtime for ${CRAFT_ARCH_BUILD_FOR:-$(uname -m)} Snap build."
          ;;
      esac
      # Create wrapper script
      mkdir -p $CRAFT_PART_INSTALL/bin
      cat > $CRAFT_PART_INSTALL/bin/nvbroadcast-wrapper << 'EOF'
      #!/bin/bash
      ARCH="$(uname -m)"
      case "$ARCH" in
        aarch64|arm64) TRIPLET="aarch64-linux-gnu" ;;
        *) TRIPLET="x86_64-linux-gnu" ;;
      esac
      export GST_PLUGIN_PATH="$SNAP/usr/lib/$TRIPLET/gstreamer-1.0${GST_PLUGIN_PATH:+:$GST_PLUGIN_PATH}"
      export GI_TYPELIB_PATH="$SNAP/usr/lib/$TRIPLET/girepository-1.0${GI_TYPELIB_PATH:+:$GI_TYPELIB_PATH}"
      cd $SNAP
      exec python3 -m nvbroadcast "$@"
      EOF
      chmod +x $CRAFT_PART_INSTALL/bin/nvbroadcast-wrapper

  # NVIDIA GPU support (for users with NVIDIA drivers)
  nvidia-support:
    plugin: nil
    stage-packages:
      - libgl1
      - libgles2
    after: [nvbroadcast]

layout:
  /usr/share/libdrm:
    bind: $SNAP/usr/share/libdrm
